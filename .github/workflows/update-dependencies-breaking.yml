name: Update Dependencies (breaking)

on:
  schedule:
    - cron: '0 3 1 * *' # the 1st of every month at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Update dependencies (breaking)
        id: update-breaking
        uses: yanovian/update-dependencies-action@v1
        with:
          update-strategy: breaking
          create-pull-request: true
          github-token: ${{ secrets.PAT_TOKEN }}

      - name: Regenerate companion animations and GIFs
        if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr checkout ${{ steps.update.outputs.pull-request-number }}
          pnpm animations
          pnpm gif:convert
          if ! git diff --quiet -- lottie-json public/gif; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add lottie-json public/gif
            git commit -m "Regenerate companion animations and GIFs for dependency update"
            git push
          fi
