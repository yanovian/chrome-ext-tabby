name: Feature request
description: Suggest an idea to make Tabby better
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea for Tabby? Tell us about it below.

  - type: checkboxes
    id: existing
    attributes:
      label: Checked for duplicates
      options:
        - label: I searched open and closed issues and didn't find this already suggested
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What's missing, awkward, or annoying right now?
      placeholder: There's no way to make Tabby quieter without turning her off entirely.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
      placeholder: A "quiet mode" that keeps her visible but turns off all speech.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Optional. Any workarounds or other approaches you've thought about.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Mockups, links, or examples from other extensions.
    validations:
      required: false
